short_description: Property valuation tool for 1970s Boston census tracts. Multivariable linear regression on 13 socio-economic features with log-transformed target. Test r² improves from 0.67 to 0.74 after transformation. Live interactive predictor deployed on Azure App Service.
full_description: A property valuation system trained on 506 Boston census tracts with 13 socio-economic and geographic features. Two models are compared — raw linear regression (test r²=0.67) and log-transformed target (test r²=0.74). The log transformation reduces residual skew from 1.46 to 0.09, bringing the error distribution close to normal and improving out-of-sample accuracy.

  The deployed app exposes all 13 feature sliders. Adjusting rooms, pollution, crime rate, or river proximity updates the estimated property value in real time. A feature impact panel shows which characteristics are currently pushing the price up or down and by how much — making the model's internal logic visible without showing raw coefficients.

  Key findings: each additional room adds approximately $3,109. NOX (pollution) is the strongest negative predictor. River proximity (CHAS) adds a positive premium. Average Boston property estimated at $20,703; an 8-room river-front property in a low-poverty area estimates at $25,792.

problem: Deploying the valuation function from a regression analysis as a live interactive tool — making the model's feature relationships explorable rather than static in a notebook.

solution: StandardScaler + LinearRegression on log(PRICE) trained from the existing analysis. FastAPI serves POST /predict accepting all 13 features. Interactive sliders with real-time price updates and feature impact display. Deployed to Azure App Service.

challenges: The log transformation is applied during training and must be reversed during inference — np.exp(prediction) * 1000 converts log-scale predictions back to dollars. The existing notebook CI workflow must be preserved alongside the new API test workflow without conflict.

results: Test r²=0.74 on 20% holdout. Average property prediction: ~$20,703. Premium property (8 rooms, river-front, low poverty): ~$25,792.
