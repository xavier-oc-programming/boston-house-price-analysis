name: Publish Notebook

on:
  push:
    branches:
      - main
    paths:
      - 'notebooks/analysis/A_03_Multivariable_Regression_Complete.ipynb'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install jupyter nbconvert

      - name: Convert notebook to HTML
        run: |
          jupyter nbconvert --to html \
            --no-input \
            --output-dir . \
            --output index.html \
            notebooks/analysis/A_03_Multivariable_Regression_Complete.ipynb
          mkdir -p notebook_web_render
          mv index.html notebook_web_render/index.html

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notebook_web_render/index.html
          git diff --staged --quiet || git commit -m "Update rendered notebook"
          git push origin main
