# API tests + Azure deploy — runs on every push to main.
# Model files (models/*.pkl) are committed so tests load without retraining.
# Deploy job only runs if all tests pass.
# The existing publish_notebook.yml workflow is unchanged.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/webapps-deploy@v3
        with:
          app-name: boston-house-price-xoc
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
